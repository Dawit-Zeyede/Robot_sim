amcl:
  ros__parameters:
    use_sim_time: True
    set_initial_pose: true
    initial_pose:
      x: 0.0
      y: 0.0
      z: 0.0
      yaw: 0.0
    min_particles: 100
    max_particles: 5000
    kld_err: 0.05
    update_min_d: 0.2
    update_min_a: 0.2
    resample_interval: 1
    transform_tolerance: 1.0
    scan_topic: /scan
    odom_frame_id: odom
    base_frame_id: base_link
    global_frame_id: map
    laser_max_range: 10.0