slam_toolbox:
  ros__parameters:
    use_sim_time: True
    # synchronous: True
    mode: mapping

    # Map quality
    resolution: 0.05                # Good balance; use 0.03 for sharper detail if memory allows
    map_update_interval: 1.0        # Faster updates for smoother visualization
    minimum_time_interval: 0.1      # Use more scans if lidar publishes >10 Hz

    # Sensor ranges (match your lidar)
    minimum_laser_range: 0.12       # Matches lidar minimum
    max_laser_range: 10.0           # Matches lidar maximum

    # SLAM tuning
    transform_timeout: 1.0         # Allow more time for TF lookups in simulation
    tf_buffer_duration: 30.0
    lookup_transform_timeout: 0.2
    transform_publish_period: 0.01  # TF updates at 20 Hz
    scan_topic: /scan
    odom_frame: odom
    base_frame: base_link
    map_frame: map

    # Loop closure & optimization
    enable_interactive_mode: false  # Keep mapping automatic
    enable_loop_closure: true       # Correct drift when revisiting areas
    enable_pose_graph: true         # Optimize map globally
    pose_graph_save_period: 30.0    # Save graph periodically (seconds)
    link_match_minimum_response_norm: 0.8